<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matt Graff</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="#portfolio">Portfolio</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <div class="hero">
                <h1>Your Name</h1>
                <p>Welcome to my portfolio website!</p> <!---#TODO: fix-->
                <img src="img/banner.jpg" alt="welcome banner">

            </div>
        </section>
        <section id="about">
            <div class="about-content">
                <h2>About Me</h2>
                <p>Add a brief introduction about yourself here.</p>
            </div>
        </section>
        <section id="portfolio">
            <div class="portfolio-items">
                <!-- Add your portfolio items here -->
                <!-- Example item:
                <div class="portfolio-item">
                    <img src="path_to_image.jpg" alt="Project 1">
                    <h3>Project 1</h3>
                    <p>Description of Project 1</p>
                </div>
                -->
            </div>
        </section>
        <section id="contact">
            <div class="contact-form">
                <h2>Contact Me</h2>
                <form>
                    <label for="name">enter name:</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>

                    <p>Select:</p>
                    <input type="radio" name="selection" value="0-25" id="option-1">
                    <label for="option-1">0-25</label>

                    <input type="radio" name="selection" value="26-50" id="option-2">
                    <label for="option-1">26-50</label>

                    <input type="radio" name="selection" value="51+" id="option-3">
                    <label for="option-1">51+</label>
                    
                    <br>
                    <p>Dropdown:</p>
                    <label for="question">Security question:</label>
                    <select name="question" id="question">
                        <option value="q1">Question 1</option>
                        <option value="q2">Question 2</option>

                    </select>
                    <br><br>

                    <label for="bio">your bio:</label><br>
                    <textarea name="bio" id="bio" cols="30" rows="10" placeholder="type..."></textarea>

                    <input type="date" name="date" id="date">
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Your Name. All rights reserved.</p>
    </footer>

    <script src="index.js"></script>

</body>
</html>
